<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Questflow 2API - 配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;padding:12px}
h1{font-size:18px;text-align:center;margin:8px 0 16px;color:#fff}
h1 span{color:#7c3aed}
.card{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2a2a}
.card h2{font-size:14px;color:#7c3aed;margin-bottom:12px;display:flex;align-items:center;gap:6px}
label{display:block;font-size:12px;color:#888;margin-bottom:4px;margin-top:10px}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:#e0e0e0;font-size:13px;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#7c3aed}
input[type=password]{font-family:monospace;font-size:11px}
.btns{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#7c3aed;color:#fff}
.btn-primary:active{background:#6d28d9}
.btn-secondary{background:#252525;color:#ccc;border:1px solid #333}
.btn-danger{background:#1a1a1a;color:#ef4444;border:1px solid #3a1a1a}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.success{background:#166534}
.toast.error{background:#7f1d1d}
.status{text-align:center;font-size:12px;color:#666;margin-top:8px}
.status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.status .dot.on{background:#22c55e}
.status .dot.off{background:#ef4444}
.version{text-align:center;font-size:11px;color:#444;margin-top:8px}
</style>
</head>
<body>
<h1>Questflow <span>2API</span> 配置面板</h1>

<div id="statusBar" class="status">
  <span class="dot"></span> <span id="statusText">检测中...</span> | 端口: <span id="portDisplay">-</span>
</div>

<div class="card">
  <h2>🔐 认证配置</h2>
  <label>Cookie / 认证 Token</label>
  <input type="password" id="cfg_AUTH_TOKEN" placeholder="questflow.csrf-token=xxx; questflow.session-token=...">
  <label>认证方式</label>
  <select id="cfg_AUTH_TYPE">
    <option value="cookie">Cookie</option>
    <option value="bearer">Bearer Token</option>
    <option value="apikey">API Key</option>
    <option value="custom">自定义 Header</option>
  </select>
  <label>公司 ID (Company ID)</label>
  <input type="text" id="cfg_COMPANY_ID" placeholder="从抓包请求体获取">
</div>

<div class="card">
  <h2>⚙️ API 设置</h2>
  <label>目标基础地址</label>
  <input type="text" id="cfg_BASE_URL" placeholder="https://next.questflow.ai">
  <label>聊天接口路径</label>
  <input type="text" id="cfg_CHAT_ENDPOINT" placeholder="/api/v6/copilot/stream">
  <label>默认模型</label>
  <input type="text" id="cfg_DEFAULT_MODEL" placeholder="kimi-k2.7-code">
  <label>流式输出 (SSE)</label>
  <select id="cfg_STREAM_ENABLED">
    <option value="true">开启</option>
    <option value="false">关闭</option>
  </select>
</div>

<div class="card">
  <h2>🛡️ 安全 & 日志</h2>
  <label>访问密钥 (留空不验证)</label>
  <input type="text" id="cfg_ACCESS_TOKEN" placeholder="可选，设置后调用 API 需要此密钥">
  <label>服务端口</label>
  <input type="number" id="cfg_PORT" placeholder="3000">
  <label>请求超时 (毫秒)</label>
  <input type="number" id="cfg_REQUEST_TIMEOUT" placeholder="60000">
  <label>日志级别</label>
  <select id="cfg_LOG_LEVEL">
    <option value="debug">Debug</option>
    <option value="info">Info</option>
    <option value="warn">Warn</option>
    <option value="error">Error</option>
  </select>
</div>

<div class="btns">
  <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
  <button class="btn btn-secondary" onclick="restartService()">🔄 重启服务</button>
</div>
<div class="btns">
  <button class="btn btn-secondary" onclick="window.location.href='/config.html'">📋 重新加载</button>
</div>

<p class="version">Questflow 2API v1.0.0</p>

<div id="toast" class="toast"></div>

<script>
const fieldMap = {
  AUTH_TOKEN: 'QUESTFLOW_AUTH_TOKEN',
  AUTH_TYPE: 'QUESTFLOW_AUTH_TYPE',
  COMPANY_ID: 'QUESTFLOW_COMPANY_ID',
  BASE_URL: 'QUESTFLOW_BASE_URL',
  CHAT_ENDPOINT: 'QUESTFLOW_CHAT_ENDPOINT',
  DEFAULT_MODEL: 'QUESTFLOW_DEFAULT_MODEL',
  STREAM_ENABLED: 'STREAM_ENABLED',
  ACCESS_TOKEN: 'ACCESS_TOKEN',
  PORT: 'PORT',
  REQUEST_TIMEOUT: 'REQUEST_TIMEOUT',
  LOG_LEVEL: 'LOG_LEVEL',
};

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const data = await r.json();
    for (const [id, envKey] of Object.entries(fieldMap)) {
      const el = document.getElementById('cfg_' + id);
      if (!el) continue;
      const val = data[envKey] || '';
      if (el.tagName === 'SELECT') el.value = val;
      else el.value = val;
    }
    document.getElementById('portDisplay').textContent = data.PORT || '3000';
    document.getElementById('statusText').textContent = '服务运行中';
    document.querySelector('#statusBar .dot').className = 'dot on';
  } catch (e) {
    document.getElementById('statusText').textContent = '无法连接';
    document.querySelector('#statusBar .dot').className = 'dot off';
  }
}

async function saveConfig() {
  const config = {};
  for (const [id, envKey] of Object.entries(fieldMap)) {
    const el = document.getElementById('cfg_' + id);
    if (!el) continue;
    config[envKey] = el.value;
  }
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    const data = await r.json();
    if (r.ok) toast(data.message || '配置已保存，请重启服务生效', 'success');
    else toast(data.error || '保存失败', 'error');
  } catch (e) {
    toast('保存失败，请检查服务是否运行', 'error');
  }
}

async function restartService() {
  if (!confirm('确定要重启服务吗？正在进行的请求会中断。')) return;
  try {
    const r = await fetch('/api/config/restart', { method: 'POST' });
    const data = await r.json();
    if (r.ok) toast('重启指令已发送，3 秒后刷新...', 'success');
    else toast(data.error || '重启失败', 'error');
    setTimeout(() => location.reload(), 3000);
  } catch (e) {
    toast('重启失败，请手动重启', 'error');
  }
}

loadConfig();
</script>
</body>
</html>
